name: Run ESLint and build frontend

on: pull_request

jobs:
  frontend:
    name: Lint and build JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - run: |
         cd frontend && \
         corepack install -g yarn && \
         yarn && \
         yarn lint-staged && \
         yarn build
